<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="card.css">
<style>.ri{width:56px;height:56px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.ri.on{background:var(--bg-panel-raised);color:var(--accent)}.ri.off{color:var(--text-secondary)}.g{font-family:var(--display);font-size:18px;line-height:1}</style></head>
<body><div class="col" style="gap:8px">
<div class="lbl">left nav rail — single-glyph items (functional unicode, not icon files)</div>
<div class="row" style="gap:6px;background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:6px;padding:6px;width:max-content">
  <div class="ri on"><span class="g">●</span><span class="lbl">HUB</span></div>
  <div class="ri off"><span class="g">▶</span><span class="lbl">LIVE</span></div>
  <div class="ri off"><span class="g">♛</span><span class="lbl">LDR</span></div>
  <div class="ri off"><span class="g">◈</span><span class="lbl">AGNT</span></div>
  <div class="ri off"><span class="g">+</span><span class="lbl">MINT</span></div>
</div></div></body></html>
