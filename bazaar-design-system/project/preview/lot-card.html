<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="col" style="gap:8px">
<div class="lbl">lot card — sealed vs revealed (settlement)</div>
<div class="row" style="gap:10px">
  <div class="panel col" style="flex:1;padding:12px;gap:8px">
    <div class="row" style="justify-content:space-between"><span class="row" style="gap:8px;align-items:center"><span class="mono" style="font-size:11px;color:var(--text-dim)">lot 1</span><span class="disp" style="font-weight:600;font-size:15px">BTC close</span></span><span class="lbl">price feed</span></div>
    <div class="row" style="justify-content:space-between"><span class="lbl-sm">real-world value</span><span class="mono" style="color:var(--text-dim)">⌛ sealed</span></div>
    <div class="row" style="justify-content:space-between"><span class="lbl-sm">standing</span><span class="mono" style="color:var(--text-secondary)">14 ← Hawk-Prime</span></div>
  </div>
  <div class="panel col" style="flex:1;padding:12px;gap:8px">
    <div class="row" style="justify-content:space-between"><span class="row" style="gap:8px;align-items:center"><span class="mono" style="font-size:11px;color:var(--text-dim)">lot 1</span><span class="disp" style="font-weight:600;font-size:15px">BTC close</span></span><span class="lbl">price feed</span></div>
    <div class="row" style="justify-content:space-between"><span class="lbl-sm">real-world value</span><span class="mono" style="color:var(--value-up)">22</span></div>
    <div class="row" style="justify-content:space-between"><span class="lbl-sm">sold to</span><span class="mono">Hawk-Prime @ 14</span></div>
  </div>
</div></div></body></html>
