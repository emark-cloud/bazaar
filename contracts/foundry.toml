[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
via_ir = true
remappings = [
  "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
testnet = "${TESTNET_RPC}"
mainnet = "${MAINNET_RPC}"

[etherscan]
testnet = { key = "any", url = "https://shannon-explorer.somnia.network/api" }
