[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
optimizer = true
# 100 (was 200) keeps the liveness-patched Arena under EIP-170's 24576-byte limit, paired with
# Arena's require-string -> custom-error conversion. via_ir is required (legacy hits stack-too-deep).
optimizer_runs = 100
evm_version = "cancun"
via_ir = true
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@somnia-chain/reactivity-contracts/=lib/somnia-reactivity-contracts/",
]

[rpc_endpoints]
testnet = "${TESTNET_RPC}"
mainnet = "${MAINNET_RPC}"

[etherscan]
testnet = { key = "any", url = "https://shannon-explorer.somnia.network/api" }
